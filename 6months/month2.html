<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Month 2 — Piece It Together ♥</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
            rel="stylesheet" />
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                image-rendering: pixelated;
            }
            body {
                background: #1a0a14;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding: 20px 16px 40px;
                font-family: "Press Start 2P", monospace;
                overflow-x: hidden;
            }
            .stars {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 0;
            }
            .star {
                position: absolute;
                width: 4px;
                height: 4px;
                background: #ffd6e0;
                animation: twinkle 2s infinite;
            }
            @keyframes twinkle {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.15;
                }
            }

            .page-wrap {
                position: relative;
                z-index: 1;
                width: 100%;
                max-width: 680px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 18px;
            }

            .top-badge {
                background: #ff2d55;
                color: #fff0f5;
                font-size: 6px;
                padding: 5px 12px;
                display: inline-block;
                letter-spacing: 1px;
                box-shadow: 4px 4px 0 #8b0024;
                margin-top: 10px;
            }
            .page-title {
                font-size: 12px;
                color: #ffd6e0;
                text-shadow: 3px 3px 0 #8b0024;
                text-align: center;
                line-height: 1.8;
            }
            .page-sub {
                font-size: 7px;
                color: #ff8fab;
                text-align: center;
                line-height: 1.9;
            }

            .pixel-border {
                border: 4px solid #ff6b8a;
                box-shadow:
                    0 0 0 4px #1a0a14,
                    0 0 0 8px #ff6b8a,
                    0 0 0 12px #1a0a14;
                background: #2d0f22;
                padding: 20px;
                width: 100%;
            }

            .hud {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 14px;
                flex-wrap: wrap;
                gap: 8px;
            }
            .hud-box {
                background: #3d1030;
                border: 3px solid #ff6b8a;
                box-shadow: 3px 3px 0 #8b0024;
                padding: 6px 10px;
                font-size: 6px;
                color: #ff8fab;
            }
            .hud-box span {
                color: #ff2d55;
                font-size: 9px;
                display: block;
                margin-top: 2px;
            }

            .difficulty-row {
                display: flex;
                gap: 8px;
                justify-content: center;
                margin-bottom: 14px;
                flex-wrap: wrap;
            }
            .diff-btn {
                background: #3d1030;
                border: 3px solid #ff6b8a;
                box-shadow: 3px 3px 0 #8b0024;
                color: #ff8fab;
                font-family: "Press Start 2P", monospace;
                font-size: 6px;
                padding: 5px 10px;
                cursor: pointer;
                transition: transform 0.1s;
            }
            .diff-btn:hover {
                transform: translate(-1px, -1px);
                box-shadow: 4px 4px 0 #8b0024;
            }
            .diff-btn.active {
                background: #ff2d55;
                color: #fff0f5;
                border-color: #ff2d55;
            }

            .puzzle-area {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 16px;
                width: 100%;
            }

            #puzzle-board {
                position: relative;
                border: 4px solid #ff2d55;
                box-shadow: 4px 4px 0 #8b0024;
                background: #1a0a14;
                overflow: hidden;
                touch-action: none;
            }

            .puzzle-piece {
                position: absolute;
                cursor: grab;
                border: 2px solid #ff2d55;
                box-shadow: 2px 2px 0 #8b0024;
                transition: box-shadow 0.1s;
                touch-action: none;
                user-select: none;
            }
            .puzzle-piece:hover {
                box-shadow: 4px 4px 0 #ff6b8a;
                z-index: 50 !important;
            }
            .puzzle-piece.dragging {
                cursor: grabbing;
                z-index: 999 !important;
                box-shadow: 6px 6px 0 #ff2d55;
            }
            .puzzle-piece.snapped {
                border-color: #ffd6e0;
                cursor: default;
            }
            .puzzle-piece.snapped:hover {
                box-shadow: 2px 2px 0 #8b0024;
            }

            .tray-label {
                font-size: 6px;
                color: #ff8fab;
                text-align: center;
                margin-bottom: 6px;
            }
            #piece-tray {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                justify-content: center;
                background: #3d1030;
                border: 3px solid #ff6b8a;
                box-shadow: 4px 4px 0 #8b0024;
                padding: 50px;
                width: 25%;
                min-height: 70px;
            }

            .action-row {
                display: flex;
                gap: 10px;
                justify-content: center;
                flex-wrap: wrap;
            }
            .action-btn {
                background: #ff2d55;
                border: none;
                color: #fff0f5;
                font-family: "Press Start 2P", monospace;
                font-size: 6px;
                padding: 8px 14px;
                cursor: pointer;
                box-shadow: 4px 4px 0 #8b0024;
                transition: transform 0.1s;
            }
            .action-btn:hover {
                transform: translate(-1px, -1px);
                box-shadow: 5px 5px 0 #8b0024;
            }
            .action-btn:active {
                transform: translate(1px, 1px);
                box-shadow: 2px 2px 0 #8b0024;
            }
            .action-btn.secondary {
                background: #3d1030;
                border: 3px solid #ff6b8a;
                color: #ff8fab;
            }

            .ghost-board {
                position: absolute;
                inset: 0;
                display: grid;
                pointer-events: none;
                opacity: 0.08;
            }
            .ghost-cell {
                border: 1px solid #ff6b8a;
            }

            /* WIN MODAL */
            .win-overlay {
                position: fixed;
                inset: 0;
                background: rgba(26, 10, 20, 0.95);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 200;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s;
                padding: 16px;
            }
            .win-overlay.show {
                opacity: 1;
                pointer-events: all;
            }
            .win-card {
                background: #fff8f0;
                border: 6px solid #ff2d55;
                box-shadow: 8px 8px 0 #8b0024;
                max-width: 420px;
                width: 100%;
                padding: 28px 22px;
                text-align: center;
                transform: scale(0.85);
                transition: transform 0.3s;
            }
            .win-overlay.show .win-card {
                transform: scale(1);
            }
            .win-title {
                font-family: "Press Start 2P", monospace;
                font-size: 12px;
                color: #ff2d55;
                margin-bottom: 12px;
                text-shadow: 2px 2px 0 #ffb3c6;
                line-height: 1.8;
            }
            .win-img {
                width: 100%;
                max-width: 260px;
                border: 4px solid #ff2d55;
                box-shadow: 4px 4px 0 #8b0024;
                display: block;
                margin: 0 auto 16px;
            }
            .win-divider {
                height: 4px;
                background: repeating-linear-gradient(90deg, #ff2d55 0 8px, transparent 8px 16px);
                margin: 12px 0;
            }
            .win-msg {
                font-family: "VT323", monospace;
                font-size: 20px;
                color: #3d1030;
                line-height: 1.7;
                margin-bottom: 16px;
            }
            .win-btn {
                background: #ff2d55;
                border: none;
                color: #fff0f5;
                font-family: "Press Start 2P", monospace;
                font-size: 7px;
                padding: 10px 18px;
                cursor: pointer;
                box-shadow: 4px 4px 0 #8b0024;
            }

            .hearts-rain {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 199;
            }
            .rain-heart {
                position: absolute;
                top: -30px;
                font-size: 18px;
                animation: fall linear forwards;
                color: #ff2d55;
            }
            @keyframes fall {
                to {
                    transform: translateY(110vh) rotate(360deg);
                    opacity: 0;
                }
            }
        </style>
    </head>
    <body>
        <div class="stars" id="stars"></div>

        <div class="page-wrap">
            <div class="top-badge">★ MONTH 2 · QUEST UNLOCKED ★</div>
            <div class="page-title">CAN YOU PIECE IT TOGETHER</div>
            <div class="page-sub">drag & drop the pieces to reveal our memory ♥</div>

            <div class="pixel-border">
                <div class="hud">
                    <div class="hud-box">MOVES<span id="move-count">0</span></div>
                    <div class="hud-box">PIECES<span id="piece-status">0 / 0</span></div>
                    <div class="hud-box">TIME<span id="timer">0:00</span></div>
                </div>

                <div class="difficulty-row">
                    <button class="diff-btn active" onclick="setDifficulty(2,2,this)">2×2 · EASY</button>
                    <button class="diff-btn" onclick="setDifficulty(3,3,this)">3×3 · MEDIUM</button>
                    <button class="diff-btn" onclick="setDifficulty(4,4,this)">4×4 · HARD</button>
                </div>

                <div class="puzzle-area">
                    <div id="puzzle-board">
                        <div class="ghost-board" id="ghost-board"></div>
                    </div>
                    <div class="tray-label">▼ DRAG PIECES FROM HERE ▼</div>
                    <div id="piece-tray"></div>
                    <div class="action-row">
                        <button class="action-btn" onclick="shufflePieces()">↺ SHUFFLE</button>
                        <button class="action-btn secondary" onclick="resetPuzzle()">⟳ RESET</button>
                        <button class="action-btn secondary" onclick="toggleHint()">? HINT</button>
                        <a
                            href="month3.html"
                            style="font-family: &quot;Press Start 2P&quot;, monospace; font-size: 10px; color: #ff8fab"
                            >continue</a
                        >
                    </div>
                </div>
            </div>
        </div>

        <!-- WIN MODAL -->
        <div class="win-overlay" id="win-overlay">
            <div class="win-card">
                <div class="win-title">★ YOU DID IT! ★</div>
                <img class="win-img" id="win-img" src="" alt="Us" />
                <div class="win-divider"></div>
                <div class="win-msg">Yayyyyyy good job you so smart kiss kiss<br /><br /></div>
                <button
                    class="win-btn"
                    onclick="document.getElementById('win-overlay').classList.remove('show');stopHearts()">
                    ♥ CONTINUE QUEST ♥
                </button>
            </div>
        </div>
        <div class="hearts-rain" id="hearts-rain"></div>

            let cols = 2,
                rows = 2;
            let boardW = 0,
                boardH = 0;
            let pieces = [];
            let moveCount = 0;
            let snappedCount = 0;
            let timerInterval = null;
            let seconds = 0;
            let hintOn = false;
            let heartsInterval = null;
            let dragEl = null,
                dragOffX = 0,
                dragOffY = 0;

            const img = new Image();
            img.src = IMG_SRC;
            img.onload = () => initPuzzle();

            function setDifficulty(c, r, btn) {
                document.querySelectorAll(".diff-btn").forEach((b) => b.classList.remove("active"));
                btn.classList.add("active");
                cols = c;
                rows = r;
                resetPuzzle();
            }

            function initPuzzle() {
                const maxW = Math.min(500, window.innerWidth - 80);
                const aspect = img.naturalHeight / img.naturalWidth;
                boardW = maxW;
                boardH = Math.round(maxW * aspect);

                const board = document.getElementById("puzzle-board");
                board.style.width = boardW + "px";
                board.style.height = boardH + "px";

                const ghost = document.getElementById("ghost-board");
                ghost.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
                ghost.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
                ghost.innerHTML = "";
                for (let i = 0; i < cols * rows; i++) {
                    const c = document.createElement("div");
                    c.className = "ghost-cell";
                    ghost.appendChild(c);
                }

                pieces = [];
                moveCount = 0;
                snappedCount = 0;
                seconds = 0;
                clearInterval(timerInterval);
                document.getElementById("move-count").textContent = "0";
                document.getElementById("timer").textContent = "0:00";
                document.getElementById("piece-status").textContent = `0 / ${cols * rows}`;

                const pw = Math.floor(boardW / cols);
                const ph = Math.floor(boardH / rows);

                document.querySelectorAll(".puzzle-piece").forEach((p) => p.remove());
                const tray = document.getElementById("piece-tray");
                tray.innerHTML = "";

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const canvas = document.createElement("canvas");
                        canvas.width = pw;
                        canvas.height = ph;
                        const ctx = canvas.getContext("2d");
                        ctx.drawImage(
                            img,
                            c * (img.naturalWidth / cols),
                            r * (img.naturalHeight / rows),
                            img.naturalWidth / cols,
                            img.naturalHeight / rows,
                            0,
                            0,
                            pw,
                            ph
                        );

                        const el = document.createElement("div");
                        el.className = "puzzle-piece";
                        el.style.width = pw + "px";
                        el.style.height = ph + "px";
                        el.style.backgroundImage = `url(${canvas.toDataURL()})`;
                        el.style.backgroundSize = "cover";
                        el.dataset.col = c;
                        el.dataset.row = r;
                        el.dataset.snapped = "false";

                        tray.appendChild(el);
                        pieces.push({ el, col: c, row: r, snapped: false });

                        el.addEventListener("mousedown", onDragStart);
                        el.addEventListener("touchstart", onTouchStart, { passive: false });
                    }
                }

                shufflePieces();
                startTimer();
            }

            function shufflePieces() {
                const tray = document.getElementById("piece-tray");
                const board = document.getElementById("puzzle-board");
                pieces.forEach((p) => {
                    if (!p.snapped) {
                        p.el.classList.remove("snapped");
                        p.el.dataset.snapped = "false";
                        p.snapped = false;
                        board.contains(p.el) && tray.appendChild(p.el);
                    }
                });
                snappedCount = 0;
                document.getElementById("piece-status").textContent = `0 / ${cols * rows}`;
                const children = [...tray.children];
                for (let i = children.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    tray.appendChild(children[j]);
                }
            }

            function resetPuzzle() {
                clearInterval(timerInterval);
                if (img.complete && img.naturalWidth > 0) initPuzzle();
            }

            function startTimer() {
                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    seconds++;
                    const m = Math.floor(seconds / 60);
                    const s = seconds % 60;
                    document.getElementById("timer").textContent = m + ":" + String(s).padStart(2, "0");
                }, 1000);
            }

            function toggleHint() {
                hintOn = !hintOn;
                const ghost = document.getElementById("ghost-board");
                ghost.style.opacity = hintOn ? "0.35" : "0.08";
            }

            function getSnapTarget(el) {
                const board = document.getElementById("puzzle-board");
                const br = board.getBoundingClientRect();
                const er = el.getBoundingClientRect();
                const cx = er.left + er.width / 2 - br.left;
                const cy = er.top + er.height / 2 - br.top;
                const pw = boardW / cols;
                const ph = boardH / rows;
                const gc = Math.round((cx - pw / 2) / pw);
                const gr = Math.round((cy - ph / 2) / ph);
                if (gc < 0 || gc >= cols || gr < 0 || gr >= rows) return null;
                const targetCol = parseInt(el.dataset.col);
                const targetRow = parseInt(el.dataset.row);
                if (gc === targetCol && gr === targetRow) {
                    return { x: gc * pw, y: gr * ph };
                }
                return null;
            }

            function trySnap(p) {
                const snap = getSnapTarget(p.el);
                if (snap) {
                    const board = document.getElementById("puzzle-board");
                    board.appendChild(p.el);
                    p.el.style.left = snap.x + "px";
                    p.el.style.top = snap.y + "px";
                    p.el.style.zIndex = 1;
                    p.el.classList.add("snapped");
                    p.el.dataset.snapped = "true";
                    p.snapped = true;
                    snappedCount++;
                    document.getElementById("piece-status").textContent = `${snappedCount} / ${cols * rows}`;
                    if (snappedCount === cols * rows) onWin();
                }
            }

            function onWin() {
                clearInterval(timerInterval);
                setTimeout(() => {
                    document.getElementById("win-img").src = IMG_SRC;
                    document.getElementById("win-overlay").classList.add("show");
                    startHearts();
                }, 400);
            }

            function startHearts() {
                const rain = document.getElementById("hearts-rain");
                heartsInterval = setInterval(() => {
                    const h = document.createElement("div");
                    h.className = "rain-heart";
                    h.textContent = ["♥", "♡", "❤", "💕"][Math.floor(Math.random() * 4)];
                    h.style.left = Math.random() * 100 + "vw";
                    h.style.animationDuration = 1.5 + Math.random() * 2 + "s";
                    h.style.fontSize = 12 + Math.random() * 16 + "px";
                    rain.appendChild(h);
                    setTimeout(() => h.remove(), 3500);
                }, 150);
            }

            function stopHearts() {
                clearInterval(heartsInterval);
                document.getElementById("hearts-rain").innerHTML = "";
            }

            function onDragStart(e) {
                if (e.target.dataset.snapped === "true") return;
                e.preventDefault();
                dragEl = e.target;
                const rect = dragEl.getBoundingClientRect();
                dragOffX = e.clientX - rect.left;
                dragOffY = e.clientY - rect.top;
                startDrag();
                document.addEventListener("mousemove", onDragMove);
                document.addEventListener("mouseup", onDragEnd);
            }

            function onTouchStart(e) {
                if (e.target.dataset.snapped === "true") return;
                e.preventDefault();
                dragEl = e.target;
                const touch = e.touches[0];
                const rect = dragEl.getBoundingClientRect();
                dragOffX = touch.clientX - rect.left;
                dragOffY = touch.clientY - rect.top;
                startDrag();
                document.addEventListener("touchmove", onTouchMove, { passive: false });
                document.addEventListener("touchend", onTouchEnd);
            }

            function startDrag() {
                document.body.appendChild(dragEl);
                dragEl.classList.add("dragging");
                dragEl.style.position = "fixed";
                dragEl.style.zIndex = 999;
                moveCount++;
                document.getElementById("move-count").textContent = moveCount;
            }

            function onDragMove(e) {
                if (!dragEl) return;
                dragEl.style.left = e.clientX - dragOffX + "px";
                dragEl.style.top = e.clientY - dragOffY + "px";
            }

            function onTouchMove(e) {
                if (!dragEl) return;
                e.preventDefault();
                const touch = e.touches[0];
                dragEl.style.left = touch.clientX - dragOffX + "px";
                dragEl.style.top = touch.clientY - dragOffY + "px";
            }

            function onDragEnd(e) {
                if (!dragEl) return;
                dragEl.classList.remove("dragging");
                dragEl.style.position = "absolute";

                const board = document.getElementById("puzzle-board");
                const br = board.getBoundingClientRect();
                const ex = e.clientX - dragOffX;
                const ey = e.clientY - dragOffY;
                const pw = boardW / cols;
                const ph = boardH / rows;

                if (e.clientX > br.left && e.clientX < br.right && e.clientY > br.top && e.clientY < br.bottom) {
                    board.appendChild(dragEl);
                    dragEl.style.left = ex - br.left + "px";
                    dragEl.style.top = ey - br.top + "px";
                    const p = pieces.find((pc) => pc.el === dragEl);
                    if (p) trySnap(p);
                } else {
                    document.getElementById("piece-tray").appendChild(dragEl);
                    dragEl.style.position = "";
                    dragEl.style.left = "";
                    dragEl.style.top = "";
                }

                dragEl = null;
                document.removeEventListener("mousemove", onDragMove);
                document.removeEventListener("mouseup", onDragEnd);
            }

            function onTouchEnd(e) {
                if (!dragEl) return;
                dragEl.classList.remove("dragging");
                dragEl.style.position = "absolute";

                const touch = e.changedTouches[0];
                const board = document.getElementById("puzzle-board");
                const br = board.getBoundingClientRect();
                const ex = touch.clientX - dragOffX;
                const ey = touch.clientY - dragOffY;

                if (
                    touch.clientX > br.left &&
                    touch.clientX < br.right &&
                    touch.clientY > br.top &&
                    touch.clientY < br.bottom
                ) {
                    board.appendChild(dragEl);
                    dragEl.style.left = ex - br.left + "px";
                    dragEl.style.top = ey - br.top + "px";
                    const p = pieces.find((pc) => pc.el === dragEl);
                    if (p) trySnap(p);
                } else {
                    document.getElementById("piece-tray").appendChild(dragEl);
                    dragEl.style.position = "";
                    dragEl.style.left = "";
                    dragEl.style.top = "";
                }

                dragEl = null;
                document.removeEventListener("touchmove", onTouchMove);
                document.removeEventListener("touchend", onTouchEnd);
            }

            // Stars
            const sc = document.getElementById("stars");
            for (let i = 0; i < 50; i++) {
                const s = document.createElement("div");
                s.className = "star";
                s.style.cssText = `left:${Math.random() * 100}%;top:${Math.random() * 100}%;animation-delay:${Math.random() * 2}s;animation-duration:${1.5 + Math.random() * 2}s;opacity:${0.3 + Math.random() * 0.7}`;
                sc.appendChild(s);
            }
        </script>
    </body>
</html>
